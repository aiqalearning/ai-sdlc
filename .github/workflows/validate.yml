name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plugin manifests, skills, commands, MCP config
        run: node bin/validate.js

      - name: Guard hook syntax
        run: python3 -c "import ast; ast.parse(open('bin/hooks/guard-destructive.py').read())"

  # The demo app now lives in its own repo (aiqalearning/ai-sdlc-demo-app) and is
  # exercised by the pipeline's Jenkins job (ai-sdlc-e2e), not by this workflow.
